<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"> 
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
       integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>

    <div class="container">
    
      <div class="row">
      
      <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
        <div class="text-center bg-dark" style="font-size: 30px;"> <h2 class="mb-0 text-white"> Create New Student </h2></div>
        <div class="card-body"></div>
        <form th:action="@{/students}" th:object="${student}" method="post">
        
          <div class="form-group">
          <label>Student First Name</label> <input type="text" name="firstName" class="form-control" placeholder="Enter Student FirstName">
          
           </div>
           
           <div class="form-group">
          <label>Student Last Name</label> <input type="text" name="lastName" class="form-control" placeholder="Enter Student LastName">
          
           </div>
           
           <div class="form-group">
          <label>Student email</label> <input type="text" name="email" class="form-control" placeholder="Enter email">
          
           </div>
           
           <div class="box-footer">
             <button type="submit" class="btn btn-primary">Submit</button>
           </div>
        
        </form>
      
      
      
      </div>

    

</div>

        
    
</body>
</html>
